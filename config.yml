# ============================================================
# RAG 智能工单系统 — 应用配置文件
# 使用 ${ENV_VAR:-default} 语法，运行时自动读取环境变量
# ============================================================

milvus:
  host: ${MILVUS_HOST:-localhost}
  port: ${MILVUS_PORT:-19530}
  collection_name: medical_chunks
  vector_dim: 1536
  index_type: IVF_FLAT
  metric_type: IP
  index_params:
    nlist: 1024

embedding:
  model: text-embedding-v1
  provider: dashscope
  dashscope_api_key: ${DASHSCOPE_API_KEY}
  batch_size: 32

llm:
  model: qwen-max
  provider: dashscope
  temperature: 0.1
  max_tokens: 1500
  dashscope_api_key: ${DASHSCOPE_API_KEY}

retrieval:
  top_k: 5
  score_threshold: 0.0

chunking:
  # ---------- 分块策略 ----------
  strategy: recursive           # recursive | semantic | fixed
  chunk_size: 500               # 每块最大字符数
  chunk_overlap: 50             # 相邻块重叠字符数
  min_chunk_length: 20          # 丢弃短于此值的块

  # ---------- 分隔符（按优先级从高到低） ----------
  separators:
    - "\n════"                  # 工单之间分隔线
    - "\n────────────────"     # 工单内部分隔线
    - "\n【"                    # 字段标签（故障现象、处理方案等）
    - "\nStep"                  # 排查/处理步骤
    - "\n\n"                    # 双换行（段落边界）
    - "\n"                      # 单换行
    - "。"                      # 中文句号
    - "；"                      # 中文分号
    - " "                       # 空格（最后兜底）