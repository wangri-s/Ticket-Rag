# ============================================================
# RAG 智能工单系统 — 应用配置文件
# 使用 ${ENV_VAR:-default} 语法，运行时自动读取环境变量
# ============================================================

milvus:
  host: ${MILVUS_HOST:-localhost}
  port: ${MILVUS_PORT:-19530}
  collection_name: medical_chunks
  vector_dim: 1536

  # ---------- 连接 ----------
  timeout: 30                   # 连接超时（秒）
  max_retries: 3                # 失败重试次数

  # ---------- 索引 ----------
  index_type: IVF_FLAT          # 倒排索引 + 平坦量化
  metric_type: IP               # 内积相似度（适合 text-embedding-v1 归一化向量）
  index_params:
    nlist: 1024                 # 聚类数 ≈ sqrt(总向量数) × 4

  # ---------- 搜索 ----------
  search_params:
    nprobe: 16                  # 搜索时探测的聚类数，越大精度越高速度越慢
  consistency_level: "Strong"   # Strong | Bounded | Session | Eventually

embedding:
  model: text-embedding-v1
  provider: dashscope
  dashscope_api_key: ${DASHSCOPE_API_KEY}
  dimensions: 1536              # 输出向量维度（与 milvus.vector_dim 一致）
  batch_size: 32                # 每批处理文本数

  # ---------- API 调用控制 ----------
  max_retries: 3                # 失败重试
  timeout: 60                   # 请求超时（秒）
  sleep_interval: 1             # 批量调用间隔（秒），避免触发限流

llm:
  model: qwen-max
  provider: dashscope
  temperature: 0.1
  max_tokens: 1500
  dashscope_api_key: ${DASHSCOPE_API_KEY}

  # ---------- 生成控制 ----------
  top_p: 0.8                    # 核采样（0~1），控制随机性
  seed: 42                      # 随机种子，保证结果可复现
  stream: false                 # 是否启用流式输出

  # ---------- 连接 ----------
  max_retries: 3                # 失败重试次数
  timeout: 60                   # 请求超时（秒）

  # ---------- RAG 检索参数 ----------
  retrieval_top_k: 5            # 检索返回的 chunk 数，填入 Prompt

  # ---------- 医疗运维专家 System Prompt ----------
  system_prompt: |
    你是医疗设备运维专家助手，服务于医院设备科。

    【职责范围】
    - 基于知识库中的历史工单，提供故障排查思路和处理方案参考
    - 解释医疗设备常见故障原因和维护要点
    - 对比不同设备的维修策略差异

    【安全守则 — 必须遵守】
    1. 你提供的仅为参考信息，不能替代专业工程师的现场诊断
    2. 涉及高压、辐射、生物安全等高风险操作时，必须明确提醒"仅限授权人员操作"
    3. 如果知识库中没有相关工单，应诚实说明"未找到相关历史案例"
    4. 不得给出超出运维范围的治疗建议或临床诊断

    【回答要求】
    - 引用知识库内容时，注明工单编号和来源
    - 如果涉及具体步骤，按排查→处理→验证的顺序组织
    - 用专业但易懂的中文回答

  # ---------- RAG Prompt 模板 ----------
  # {context} 会被替换为检索到的 chunks
  # {question} 会被替换为用户问题
  rag_prompt_template: |
    请根据以下历史工单记录，回答用户问题。

    【参考工单】
    {context}

    【用户问题】
    {question}

    请按以下格式回答：
    1. 故障分析 — 根据工单记录分析可能原因
    2. 参考案例 — 引用工单编号及处理方案
    3. 建议处理步骤 — 分步给出排查和处理建议
    4. 注意事项 — 安全提醒和运维建议

  # ---------- 兜底（无检索结果时） ----------
  fallback_answer: "抱歉，知识库中未找到与您问题相关的历史工单。建议：1）尝试用不同关键词描述故障现象；2）联系设备厂家技术支持。"

retrieval:
  top_k: 5                      # 默认返回条数
  score_threshold: 0.0          # 相似度阈值，低于此值丢弃
  default_mode: hybrid          # 默认检索模式: semantic | keyword | hybrid

  # ---------- 混合检索权重 ----------
  hybrid:
    dense_weight: 0.5           # 语义权重（0~1）
    sparse_weight: 0.5          # 关键字权重（0~1）

chunking:
  # ---------- 分块策略 ----------
  strategy: recursive           # recursive | semantic | fixed
  chunk_size: 500               # 每块最大字符数
  chunk_overlap: 50             # 相邻块重叠字符数
  min_chunk_length: 20          # 丢弃短于此值的块

  # ---------- 分隔符（按优先级从高到低） ----------
  separators:
    - "\n════"                  # 工单之间分隔线
    - "\n────────────────"     # 工单内部分隔线
    - "\n【"                    # 字段标签（故障现象、处理方案等）
    - "\nStep"                  # 排查/处理步骤
    - "\n\n"                    # 双换行（段落边界）
    - "\n"                      # 单换行
    - "。"                      # 中文句号
    - "；"                      # 中文分号
    - " "                       # 空格（最后兜底）