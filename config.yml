# ============================================================
# RAG 智能工单系统 — 应用配置文件
# 使用 ${ENV_VAR:-default} 语法，运行时自动读取环境变量
# ============================================================

milvus:
  host: ${MILVUS_HOST:-localhost}
  port: ${MILVUS_PORT:-19530}
  collection_name: medical_chunks
  vector_dim: 1536

  # ---------- 连接 ----------
  timeout: 30                   # 连接超时（秒）
  max_retries: 3                # 失败重试次数

  # ---------- 索引 ----------
  index_type: IVF_FLAT          # 倒排索引 + 平坦量化
  metric_type: IP               # 内积相似度（适合 text-embedding-v1 归一化向量）
  index_params:
    nlist: 1024                 # 聚类数 ≈ sqrt(总向量数) × 4

  # ---------- 搜索 ----------
  search_params:
    nprobe: 16                  # 搜索时探测的聚类数，越大精度越高速度越慢
  consistency_level: "Strong"   # Strong | Bounded | Session | Eventually

embedding:
  model: text-embedding-v1
  provider: dashscope
  dashscope_api_key: ${DASHSCOPE_API_KEY}
  dimensions: 1536              # 输出向量维度（与 milvus.vector_dim 一致）
  batch_size: 32                # 每批处理文本数

  # ---------- API 调用控制 ----------
  max_retries: 3                # 失败重试
  timeout: 60                   # 请求超时（秒）
  sleep_interval: 1             # 批量调用间隔（秒），避免触发限流

llm:
  model: qwen-max
  provider: dashscope
  temperature: 0.1
  max_tokens: 1500
  dashscope_api_key: ${DASHSCOPE_API_KEY}

  # ---------- 生成控制 ----------
  top_p: 0.8                    # 核采样（0~1），控制随机性
  seed: 42                      # 随机种子，保证结果可复现
  stream: false                 # 是否启用流式输出

  # ---------- 连接 ----------
  max_retries: 3                # 失败重试次数
  timeout: 60                   # 请求超时（秒）

  # ---------- 输出格式 ----------
  output_format: text           # text | json — 默认输出格式（text=自然语言回答，json=结构化JSON）

  # ---------- RAG 检索参数 ----------
  retrieval_top_k: 5            # 检索返回的 chunk 数，填入 Prompt

  # ---------- 医疗运维专家 System Prompt ----------
  system_prompt: |
    你是医疗设备运维专家助手，服务于医院设备科。

    【职责范围】
    - 基于知识库中的历史工单，提供故障排查思路和处理方案参考
    - 解释医疗设备常见故障原因和维护要点
    - 对比不同设备的维修策略差异

    【思考方式 — 思维链（Chain-of-Thought）】
    当遇到需要鉴别诊断的问题时（如同一故障现象可能由多个子系统引起），请按以下思路推理：
    1. 拆解故障现象 — 把模糊描述拆成具体的技术症状
    2. 列举可能原因 — 从最可能到最不可能排序
    3. 对照工单证据 — 逐一检查参考工单中的排查路径和最终结论
    4. 排除与确认 — 排除工单中已证明不相关的原因，确认最匹配的诊断路径
    5. 形成建议 — 基于以上推理，给出排查步骤和注意事项
    示例推理：「图像模糊」可能来自探测器校准漂移、球管老化、或重建算法参数异常。工单GD-2026-03001指向校准问题，结合"每日预热扫描正常"这点，优先排查软件参数而非硬件故障。

    【安全守则 — 必须遵守】
    1. 你提供的仅为参考信息，不能替代专业工程师的现场诊断
    2. 涉及高压、辐射、生物安全等高风险操作时，必须明确提醒"仅限授权人员操作"
    3. 如果知识库中没有相关工单，应诚实说明"未找到相关历史案例"
    4. 不得给出超出运维范围的治疗建议或临床诊断

    【回答要求】
    - 引用知识库内容时，注明工单编号和来源
    - 如果涉及具体步骤，按排查→处理→验证的顺序组织
    - 对于鉴别诊断类问题，先分析症状再给出建议方向（思维链推理）
    - 用专业但易懂的中文回答

  # ---------- RAG Prompt 模板 ----------
  # {context} 会被替换为检索到的 chunks
  # {question} 会被替换为用户问题
  rag_prompt_template: |
    请根据以下历史工单记录，回答用户问题。

    【参考工单】
    {context}

    【用户问题】
    {question}

    【回答格式要求】
    1. 故障分析 — 根据工单记录，运用思维链推理分析可能原因（拆解现象→列举可能原因→对照工单证据→确认最匹配路径）
    2. 参考案例 — 明确引用工单编号及处理方案
    3. 建议处理步骤 — 分步给出排查和处理建议
    4. 注意事项 — 安全提醒和运维建议

    ─── 回答示例（格式参考） ───
    以下是一个标准回答示例，请参照此格式和详细程度：

    【示例问题】透析液电导率偏高报警怎么处理？
    【示例回答】
    1. 故障分析
    根据工单记录，透析液电导率偏高通常与浓缩液配比、供水管路、或传感器校准有关。从症状拆解：电导率偏高意味着离子浓度超标。可能原因按概率排序：①A/B 液配比不当（最可能）；②供水管路污染或堵塞；③电导率传感器零点漂移。对照工单 GD-2026-03003，技术人员发现 A 液泵管老化导致吸液量不准，更换后恢复正常——这与"配比不当"的诊断路径吻合。

    2. 参考案例
    - 工单 GD-2026-03003：A 液泵管老化 → 更换泵管并重新定标 → 电导率恢复正常
    - 工单 GD-2026-03005：供水过滤器堵塞 → 清洗过滤器并冲洗管路 → 报警消除

    3. 建议处理步骤
    ① 检查浓缩液有效期和配比参数是否正确
    ② 目视检查 A/B 液管路有无气泡、渗漏或老化
    ③ 用标准溶液校准电导率传感器
    ④ 若以上步骤无效，检查供水管路压力和过滤器状态

    4. 注意事项
    - 更换管路后必须重新执行电导率定标
    - 涉及透析液管路操作需遵守无菌规范
    - 若处理后仍持续报警，应停用该机位并联系厂家技术支持
    ─── 示例结束 ───

  # ---------- JSON 结构化输出模板（API 场景） ----------
  # {context} / {question} 同上
  # 约束模型返回合法 JSON，避免下游解析失败
  json_prompt_template: |
    请根据以下历史工单记录，回答用户问题。必须严格按指定的 JSON 格式输出，不要输出任何 JSON 之外的内容。

    【参考工单】
    {context}

    【用户问题】
    {question}

    【输出要求】
    返回一个合法的 JSON 对象，Schema 如下：
    {{
      "question": "用户原始问题（字符串）",
      "has_reference": true/false,
      "analysis": {{
        "symptom_breakdown": "将故障现象拆解为具体技术症状",
        "possible_causes": ["原因1（按可能性从高到低排序）", "原因2", "原因3"],
        "reasoning_chain": "思维链推理过程：逐一对照工单证据，排除/确认每个可能原因"
      }},
      "references": [
        {{
          "ticket_id": "工单编号",
          "relevance": "该工单与当前问题的相关程度及原因",
          "key_findings": "工单中的关键排查结论"
        }}
      ],
      "recommendations": {{
        "steps": ["具体操作步骤1", "步骤2", "步骤3"],
        "precautions": ["安全注意事项1", "注意事项2"],
        "urgency": "low/medium/high/critical — 根据故障影响范围评估紧急程度"
      }}
    }}

    ─── JSON 输出示例 ───
    {{
      "question": "透析液电导率偏高报警怎么处理？",
      "has_reference": true,
      "analysis": {{
        "symptom_breakdown": "电导率偏高意味着透析液中离子浓度超过安全阈值，可能涉及浓缩液配比、供水质量、传感器校准三个子系统",
        "possible_causes": ["A/B 液配比参数偏移", "电导率传感器零点漂移", "供水管路污染或过滤器堵塞", "浓缩液过期或批次异常"],
        "reasoning_chain": "工单 GD-2026-03003 中，技术员先排查配比参数（正常），再检查管路发现 A 液泵管老化致吸液量不准→确定为配比执行偏差。GD-2026-03005 则是供水侧问题。综合分析：优先排查配比执行部件（泵管、电磁阀），其次校准传感器，最后检查供水"
      }},
      "references": [
        {{
          "ticket_id": "GD-2026-03003",
          "relevance": "高度相关——同型号设备、同报警症状，最终确认A液泵管老化",
          "key_findings": "A液泵管老化导致吸液量不准→更换泵管并重定标→电导率恢复"
        }}
      ],
      "recommendations": {{
        "steps": ["检查A/B液管路泵管是否有气泡、渗漏或老化", "用标准电导率溶液校准传感器", "若上述无效，检查供水过滤器及管路压力"],
        "precautions": ["更换管路后必须重新执行电导率定标", "操作涉及透析液管路需遵守无菌规范", "若处理后持续报警，停用该机位并联系厂家"],
        "urgency": "high"
      }}
    }}

  # ---------- 兜底（无检索结果时） ----------
  fallback_answer: "抱歉，知识库中未找到与您问题相关的历史工单。建议：1）尝试用不同关键词描述故障现象；2）联系设备厂家技术支持。"

retrieval:
  top_k: 5                      # 默认返回条数
  score_threshold: 0.0          # 相似度阈值，低于此值丢弃
  default_mode: hybrid          # 默认检索模式: semantic | keyword | hybrid

  # ---------- 混合检索权重 ----------
  hybrid:
    dense_weight: 0.5           # 语义权重（0~1）
    sparse_weight: 0.5          # 关键字权重（0~1）

  # ---------- 查询预处理 ----------
  query_preprocess:
    enabled: false               # 是否启用查询预处理
    rewrite: true                # 查询改写（口语→关键词）
    multi_query: false           # 多路查询扩展（生成多个变体）
    multi_query_n: 3             # 多路扩展变体数

  # ---------- 重排序 ----------
  rerank:
    enabled: false               # 是否启用重排序
    model: qwen3-rerank          # 重排序模型
    oversample_factor: 3         # 初检倍数（初检 top_k × factor 条，重排后取 top_k 条）
    max_retries: 3
    timeout: 30

chunking:
  # ---------- 分块策略 ----------
  strategy: recursive           # recursive | semantic | fixed
  chunk_size: 500               # 每块最大字符数
  chunk_overlap: 50             # 相邻块重叠字符数
  min_chunk_length: 20          # 丢弃短于此值的块

  # ---------- 分隔符（按优先级从高到低） ----------
  separators:
    - "\n════"                  # 工单之间分隔线
    - "\n────────────────"     # 工单内部分隔线
    - "\n【"                    # 字段标签（故障现象、处理方案等）
    - "\nStep"                  # 排查/处理步骤
    - "\n\n"                    # 双换行（段落边界）
    - "\n"                      # 单换行
    - "。"                      # 中文句号
    - "；"                      # 中文分号
    - " "                       # 空格（最后兜底）

# ============================================================
# 三级记忆系统 — Redis 短期 + Kafka 消息队列 + MySQL 长期
# ============================================================

memory:
  # ---------- 短期记忆（Redis）----------
  redis:
    host: ${REDIS_HOST:-localhost}
    port: ${REDIS_PORT:-6379}
    db: 0
    password: ${REDIS_PASSWORD:-}
    ttl: 86400                   # 短期记忆过期时间（秒），默认24小时
    max_messages: 20             # 每个会话最多保留的消息条数
    key_prefix: "rag:session"    # Redis key 前缀

  # ---------- 长期记忆（MySQL）----------
  mysql:
    host: ${MYSQL_HOST:-localhost}
    port: ${MYSQL_PORT:-3306}
    user: ${MYSQL_USER:-root}
    password: ${MYSQL_PASSWORD:-}
    database: ${MYSQL_DATABASE:-rag_memory}
    charset: utf8mb4
    pool_size: 5                 # 连接池大小
    max_retries: 3               # 写入失败最大重试次数
    retry_base_delay: 0.5        # 重试基础延迟（秒），指数退避: 0.5→1→2→4
    retry_max_delay: 5.0         # 重试延迟上限（秒）

  # ---------- 消息队列（Kafka）----------
  kafka:
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
    topic_messages: rag.conversation.messages   # 消息持久化 topic
    topic_summaries: rag.conversation.summaries # 摘要持久化 topic
    consumer_group: rag-memory-consumer
    max_retries: 3               # 发送失败最大重试次数
    retry_base_delay: 0.5        # 重试基础延迟（秒）
    retry_max_delay: 5.0         # 重试延迟上限（秒）

  # ---------- 中期记忆（摘要）----------
  summary:
    enabled: true                # 是否启用中期摘要
    trigger_turns: 5             # 每 N 轮对话触发一次摘要
    model: qwen-max              # 摘要使用的 LLM 模型
    max_summary_length: 300      # 摘要最大字符数

# ============================================================
# 语义缓存 — 相同/相似问题跳过 LLM，直接返回缓存答案
# ============================================================

cache:
  enabled: true                  # 是否启用语义缓存
  similarity_threshold: 0.95     # 余弦相似度阈值（0~1），超过视为相同问题
  max_entries: 100               # 最多缓存 100 条 Q&A（LRU 淘汰）
  ttl: 3600                      # 缓存过期时间（秒），默认 1 小时

# ============================================================
# 限流与配额管理 — Token Bucket + LLM 成本追踪
# ============================================================

rate_limit:
  enabled: true                  # 总开关，false 则所有限流放行

  # ---------- 全局限流 ----------
  global_rpm: 60                 # 全局每分钟最大请求数（所有用户合计）
  global_burst: 15               # 全局突发容量（token bucket 最大 token 数）

  # ---------- 用户级限流 ----------
  user_rpm: 20                   # 单用户每分钟最大请求数
  user_burst: 5                  # 单用户突发容量

  # ---------- LLM 成本控制 ----------
  llm_max_tokens_per_hour: 100000      # 单用户每小时最大 LLM token 消耗（输入+输出）
  llm_max_requests_per_hour: 50        # 单用户每小时最大 LLM 调用次数

  # ---------- Redis 分布式后端 ----------
  redis_enabled: true            # true=Redis 分布式；false=进程内存模式